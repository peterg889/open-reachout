name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install
        run: |
          uv venv
          uv pip install -e ".[dev]"
      - name: Lint
        run: uv run ruff check src tests
      - name: Tests
        run: uv run pytest
      - name: Acceptance gates (M0 subset)
        # Disqualifying gate failures block release and cannot be waived
        # (PRD section 10 decision rule).
        run: uv run pytest -m gates
